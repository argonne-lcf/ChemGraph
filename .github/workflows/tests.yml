name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install lint dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install ruff

    - name: Run ruff
      run: |
        ruff check .

  test:
    needs: lint
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
            
    - name: Run tests
      run: |
        python -m pytest tests/ -v -k "not tblite"

  # Exercises the distributed/HPC feature set: the Academy multi-agent module
  # and the parsl / globus-compute execution backends. These tests use mocks and
  # local subprocesses (no real HPC cluster, Globus endpoint, or LLM), so they
  # run in CI. Live tests remain gated behind --run-globus-compute / --run-llm
  # and are not enabled here.
  test-extras:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies (academy + execution backends)
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[academy,parsl,globus_compute]"

    - name: Run academy + backend tests
      run: |
        python -m pytest tests/ -v -k "not tblite"
