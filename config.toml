[general]
model = "argo:gpt-4o"
workflow = "single_agent"
output = "state"
structured = true
report = true
thread = 1
recursion_limit = 20
verbose = false

[logging]
level = "WARNING"
file = "./chemgraph.log"
console = true
format = "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

[features]
enable_experimental = false
enable_cache = true
cache_dir = "./cache"
cache_expiry = 24

[security]
validate_keys = true
rate_limit = true
max_requests_per_minute = 60

[eval]
default_profile = "standard"

[api.openai]
base_url = "https://apps.inside.anl.gov/argoapi/api/v1/resource/chat/"
timeout = 30
argo_user = ""

[api.groq]
base_url = "https://api.groq.com/openai/v1"
timeout = 30

[api.anthropic]
base_url = "https://api.anthropic.com"
timeout = 30

[api.google]
base_url = "https://generativelanguage.googleapis.com/v1beta"
timeout = 30

[api.alcf]
base_url = "https://inference-api.alcf.anl.gov/resource_server/sophia/vllm/v1"
timeout = 30

[api.local]
base_url = "http://localhost:11434"
timeout = 60

[chemistry.optimization]
method = "BFGS"
fmax = 0.05
steps = 200

[chemistry.frequencies]
displacement = 0.01
nprocs = 1

[chemistry.calculators]
default = "mace_mp"
fallback = "emt"

[output.files]
directory = "./chemgraph_output"
pattern = "{timestamp}_{query_hash}"
formats = [ "xyz", "json", "html",]

[output.visualization]
enable_3d = true
viewer = "py3dmol"
dpi = 300

[advanced.agent]
custom_system_prompt = ""
max_memory_tokens = 8000
enable_function_calling = true

[advanced.parallel]
enable_parallel = false
num_workers = 2

[execution]
backend = "local"              # "local", "parsl", "ensemble_launcher", or "globus_compute"
system = "local"               # HPC system: "local", "polaris", "aurora"

[execution.local]
max_workers = 4

[execution.parsl]
worker_init = "export TMPDIR=/tmp"

[execution.ensemble_launcher]
comm_name = "async_zmq"
task_executor_name = "async_processpool"
nlevels = 0

[execution.globus_compute]
endpoint_id = ""               # UUID from: globus-compute-endpoint start <name>
# amqp_port = 443              # Uncomment if outbound port 5671 is blocked

[environments.development]
model = "gpt-4o-mini"
verbose = true
enable_cache = false

[environments.production]
model = "gpt-4o"
verbose = false
enable_cache = true
rate_limit = true

[environments.testing]
model = "gpt-4o-mini"
verbose = true
enable_cache = false

[eval.profiles.standard]
workflow_types = [ "single_agent",]
judge_model = "gpt4o"
recursion_limit = 50
structured_output = true
max_queries = 0
